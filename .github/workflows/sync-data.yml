name: Sync data (Ops)

on:
  schedule:
    # 每周一 06:00 UTC (北京时间 14:00) 自动跑
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      weapon_ids:
        description: "Override weapon IDs (comma-separated). Empty = use scripts/skland-ids.json"
        required: false
        default: ""
      substrate_ids:
        description: "Override substrate IDs (comma-separated). Empty = use scripts/skland-ids.json"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run scraper
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${{ github.event.inputs.weapon_ids }}" ] || [ -n "${{ github.event.inputs.substrate_ids }}" ]; then
            [ -n "${{ github.event.inputs.weapon_ids }}" ] && ARGS+=("--weapons=${{ github.event.inputs.weapon_ids }}")
            [ -n "${{ github.event.inputs.substrate_ids }}" ] && ARGS+=("--substrates=${{ github.event.inputs.substrate_ids }}")
          else
            ARGS+=("--from-manifest")
          fi
          pnpm exec tsx scripts/scrape-skland.ts "${ARGS[@]}"

      - name: Verify data still validates
        run: pnpm test

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet -- src/data/bundle.json; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 数据写入直接到 KV，不依赖代码部署
      - name: Upload bundle to Cloudflare KV
        if: steps.detect.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec tsx scripts/upload-bundle.ts

      # 把 bundle.json 也提交一份做审计/回退（CI/CD 已经 paths-ignore 这个文件，不会触发部署）
      - name: Commit bundle.json (audit trail)
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "Claude"
          git config user.email "bot@orcax.net"
          git add src/data/bundle.json
          git commit -m "chore(data): sync from skland wiki ($(date -u +%Y-%m-%d))"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.detect.outputs.changed }}" = "true" ]; then
            echo "Data changed → uploaded to KV; bundle.json committed for audit."
          else
            echo "No data changes; nothing to do."
          fi

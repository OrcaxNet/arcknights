name: Sync data (Ops)

on:
  schedule:
    # 每周一 06:00 UTC (北京时间 14:00) 自动跑
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Scrape skland API
        run: pnpm run scrape

      - name: Verify data still validates
        run: pnpm test

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet -- src/data/bundle.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload bundle to Cloudflare KV
        if: steps.detect.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run kv:upload

      - name: Commit bundle.json (audit trail)
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "Claude"
          git config user.email "bot@orcax.net"
          git add src/data/bundle.json
          git commit -m "chore(data): sync from skland wiki ($(date -u +%Y-%m-%d))"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.detect.outputs.changed }}" = "true" ]; then
            echo "Data changed → uploaded to KV; bundle.json committed for audit."
          else
            echo "No data changes; nothing to do."
          fi
